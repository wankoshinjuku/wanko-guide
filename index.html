<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回転わんこそば くるくるわんこ｜Thank you for visiting</title>
<style>
  :root{
    --orange:#E8842B;
    --orange-dark:#C96A14;
    --brown:#4A3120;
    --cream:#FFF7EE;
    --card:#FFFFFF;
    --accent:#E8842B;
    --text:#3A2A1B;
    --muted:#7A6552;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--text);
    line-height:1.7;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 56px;}

  /* ===== Language select screen ===== */
  #select{padding-top:34px;text-align:center;}
  .brand{
    font-size:15px;font-weight:700;color:var(--orange-dark);
    letter-spacing:.5px;margin-bottom:6px;
  }
  .select-thanks{
    font-size:24px;font-weight:800;color:var(--brown);
    margin:6px 0 4px;line-height:1.35;
  }
  .select-sub{font-size:14px;color:var(--muted);margin-bottom:26px;}
  .select-prompt{
    font-size:13px;font-weight:700;color:var(--orange-dark);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
  }
  .lang-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
  }
  .lang-btn{
    display:flex;align-items:center;gap:10px;
    background:var(--card);border:2px solid #F0DEC9;
    border-radius:16px;padding:16px 14px;cursor:pointer;
    font-size:17px;font-weight:700;color:var(--brown);
    transition:transform .08s ease,border-color .15s ease,box-shadow .15s ease;
    box-shadow:0 2px 6px rgba(74,49,32,.06);
    text-align:left;
  }
  .lang-btn:active{transform:scale(.97);}
  .lang-btn:hover{border-color:var(--orange);box-shadow:0 4px 12px rgba(232,132,43,.18);}
  .lang-btn .flag{font-size:26px;line-height:1;}

  /* ===== Content screen ===== */
  #content{display:none;}
  .topbar{
    position:sticky;top:0;z-index:10;
    background:var(--cream);
    padding:12px 0 10px;margin-bottom:4px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid #EFE0CE;
  }
  .back-btn{
    background:#fff;border:1.5px solid #E7D2B9;border-radius:999px;
    padding:8px 16px;font-size:14px;font-weight:700;color:var(--orange-dark);
    cursor:pointer;
  }
  .back-btn:active{transform:scale(.96);}
  .topbar .mini-brand{font-size:12px;font-weight:700;color:var(--muted);}

  .hero{
    text-align:center;padding:22px 14px 18px;margin:8px 0 18px;
    background:linear-gradient(135deg,var(--orange),var(--orange-dark));
    border-radius:20px;color:#fff;
    box-shadow:0 6px 18px rgba(232,132,43,.28);
  }
  .hero .main{font-size:23px;font-weight:800;line-height:1.4;margin-bottom:6px;}
  .hero .sub{font-size:14px;font-weight:600;opacity:.95;}

  .section{
    background:var(--card);border-radius:18px;padding:18px 18px 20px;
    margin-bottom:16px;box-shadow:0 2px 10px rgba(74,49,32,.07);
  }
  .section h2{
    font-size:18px;font-weight:800;color:var(--orange-dark);
    margin:0 0 12px;padding-left:12px;border-left:5px solid var(--orange);
    line-height:1.4;
  }
  .section p{margin:0 0 10px;font-size:15px;}
  .note{
    font-size:13px;color:var(--muted);background:#FBF1E4;
    border-radius:10px;padding:9px 12px;margin:10px 0;
  }
  .list-item{font-size:14px;margin:4px 0;}
  .tags{
    font-family:"SFMono-Regular",Menlo,Consolas,monospace;
    background:#FBF1E4;border:1px dashed var(--orange);
    border-radius:10px;padding:11px 13px;margin-top:8px;
    font-size:14px;font-weight:700;color:var(--orange-dark);
    word-break:break-word;line-height:1.9;
  }
  .qr-box{
    text-align:center;background:var(--card);border-radius:18px;
    padding:20px 16px 22px;margin-top:4px;
    box-shadow:0 2px 10px rgba(74,49,32,.07);
  }
  .qr-box img{
    width:210px;max-width:72%;height:auto;border-radius:12px;
    border:6px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .qr-cap{font-size:14px;font-weight:700;color:var(--brown);margin-top:12px;}
  .footer-brand{
    text-align:center;font-size:12px;color:var(--muted);
    margin-top:24px;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== Language selection ===== -->
  <div id="select">
    <div class="brand">回転わんこそば くるくるわんこ</div>
    <div class="select-thanks">Thank you for visiting!</div>
    <div class="select-sub">Please choose your language</div>
    <div class="select-prompt">Select Language</div>
    <div class="lang-grid" id="langGrid"></div>
  </div>

  <!-- ===== Content ===== -->
  <div id="content">
    <div class="topbar">
      <button class="back-btn" id="backBtn"></button>
      <span class="mini-brand">くるくるわんこ</span>
    </div>
    <div id="render"></div>
    <div class="footer-brand">回転わんこそば くるくるわんこ</div>
  </div>

</div>

const ORDER = ["en","zh","ko","fr","es","de","ru"];

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildGrid(){
  const g = document.getElementById("langGrid");
  g.innerHTML = ORDER.map(code=>{
    const d = DATA[code];
    return `<button class="lang-btn" onclick="show('${code}')"><span class="flag">${d.flag}</span><span>${esc(d.name)}</span></button>`;
  }).join("");
}

function show(code){
  const d = DATA[code];
  document.documentElement.lang = code;
  document.getElementById("backBtn").textContent = d.back;
  document.getElementById("render").innerHTML = `
    <div class="hero">
      <div class="main">${esc(d.main)}</div>
      <div class="sub">${esc(d.sub)}</div>
    </div>
    <div class="section">
      <h2>${esc(d.s1t)}</h2>
      <p>${esc(d.s1b)}</p>
      <div class="note">${esc(d.s1once)}</div>
      <p class="list-item">${esc(d.s1sns)}</p>
      <p class="list-item">${esc(d.s1lang)}</p>
      <p class="list-item">${esc(d.s1tag)}</p>
      <div class="tags">${esc(HASHTAGS)}</div>
    </div>
    <div class="section">
      <h2>${esc(d.s2t)}</h2>
      <p>${esc(d.s2b1)}</p>
      <p>${esc(d.s2b2)}</p>
      <p>${esc(d.s2b3)}</p>
    </div>
    <div class="section">
      <h2>${esc(d.s3t)}</h2>
      <p>${esc(d.s3b1)}</p>
      <div class="note">${esc(d.s3note)}</div>
    </div>
    <div class="qr-box">
      <img src="${LINE_QR}" alt="LINE QR">
      <div class="qr-cap">${esc(d.qrcap)}</div>
    </div>`;
  document.getElementById("select").style.display="none";
  document.getElementById("content").style.display="block";
  window.scrollTo(0,0);
}

function backToSelect(){
  document.getElementById("content").style.display="none";
  document.getElementById("select").style.display="block";
  document.documentElement.lang="en";
  window.scrollTo(0,0);
}

document.getElementById("backBtn").addEventListener("click",backToSelect);
buildGrid();
</script>
